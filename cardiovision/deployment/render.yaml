services:
  - type: web
    name: cardiovision-api
    env: python
    buildCommand: pip install -r backend/requirements.txt && python scripts/train_model.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
