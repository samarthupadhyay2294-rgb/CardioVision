version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cardiovision
      POSTGRES_PASSWORD: cardiovision
      POSTGRES_DB: cardiovision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cardiovision:cardiovision@db:5432/cardiovision
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./data:/app/data
      - ./ml_models:/app/ml_models
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
