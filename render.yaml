# Use this file if your Git repository root is the parent folder (cadiovision)
# containing the cardiovision/ application directory.

databases:
  - name: cardiovision-db
    plan: free
    databaseName: cardiovision
    user: cardiovision

services:
  - type: web
    name: cardiovision-api
    runtime: docker
    rootDir: cardiovision
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cardiovision-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: OCR_ENGINE
        value: easyocr
      - key: RENDER
        value: "true"

  - type: web
    name: cardiovision-web
    runtime: node
    rootDir: cardiovision/frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: cardiovision-api
          envVarKey: RENDER_EXTERNAL_URL
